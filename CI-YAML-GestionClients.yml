trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'windows-latest'

steps:
# 1. Use .NET SDK 8.x  (équivalent "Use .NET SDK")
- task: UseDotNet@2
  displayName: 'Use .NET SDK 8.x'
  inputs:
    packageType: 'sdk'
    version: '8.x'
    installationPath: '$(Agent.ToolsDirectory)/dotnet'

# 2. Restore (équivalent "NuGet restore" + pattern **/*.csproj)
- task: DotNetCoreCLI@2
  displayName: 'dotnet restore'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'

# 3. Build  (équivalent "dotnet build", **/*.csproj, args -c Release)
- task: DotNetCoreCLI@2
  displayName: 'dotnet build'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '-c Release'

# 4. Test  (équivalent "dotnet test", **/*[Tt]tests/*.csproj)
- task: DotNetCoreCLI@2
  displayName: 'dotnet test'
  inputs:
    command: 'test'
    projects: '**/*[Tt]tests/*.csproj'
    publishTestResults: true

# 5. Publish ConsoleUI  (équivalent tâche "Publish ConsoleUI")
- task: DotNetCoreCLI@2
  displayName: 'Publish ConsoleUI'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '**/GC.ConsoleUI/*.csproj'
    arguments: '-c Release -o $(Build.ArtifactStagingDirectory)/ConsoleUI'
    zipAfterPublish: true           # Zip published projects
    modifyOutputPath: true          # Add project folder name to publish path

# 6. Publish batch ModifierNomPrenom  (équivalent "Publish ModifierNomPrenom")
- task: DotNetCoreCLI@2
  displayName: 'Publish ModifierNomPrenom'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '**/GC.Batch.ModifierNomPrenomPremiereLettreMajuscules/*.csproj'
    arguments: '-c Release -o $(Build.ArtifactStagingDirectory)/BatchNomPrenom'
    zipAfterPublish: true
    modifyOutputPath: true

# 7. Publish batch ModifierPays  (équivalent "Publish ModifierPays")
- task: DotNetCoreCLI@2
  displayName: 'Publish ModifierPays'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '**/GC.Batch.ModifierPaysMajusculesClients/*.csproj'
    arguments: '-c Release -o $(Build.ArtifactStagingDirectory)/BatchPays'
    zipAfterPublish: true
    modifyOutputPath: true

# 8. Publish artifact ConsoleUI  (équivalent tâche "Artifact ConsoleUI")
- task: PublishBuildArtifacts@1
  displayName: 'Artifact ConsoleUI'
  inputs:
    pathtoPublish: '$(Build.ArtifactStagingDirectory)/ConsoleUI'
    artifactName: 'GC.ConsoleUI'
    publishLocation: 'Container'     # Azure Pipelines

# 9. Publish artifact ModifierNomPrenom
- task: PublishBuildArtifacts@1
  displayName: 'Artifact ModifierNomPrenom'
  inputs:
    pathtoPublish: '$(Build.ArtifactStagingDirectory)/BatchNomPrenom'
    artifactName: 'GC.Batch.ModifierNomPrenomPremiereLettreMajuscules'
    publishLocation: 'Container'

# 10. Publish artifact ModifierPays
- task: PublishBuildArtifacts@1
  displayName: 'Artifact ModifierPays'
  inputs:
    pathtoPublish: '$(Build.ArtifactStagingDirectory)/BatchPays'
    artifactName: 'GC.Batch.ModifierPaysMajusculesClients'
    publishLocation: 'Container'
